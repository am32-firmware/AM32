name: efficiency_sweep
description: >
  Steady-state staircase from 10% to 100% throttle. Each step dwells long enough
  to settle, and the tail of each is used to compute thrust, electrical power and
  efficiency (g/W) plus loop time / CPU load at that operating point. This is the
  primary efficiency + performance baseline.

  Hold time is 10s (up from an initial 6s): the ARK 4IN1 + JS Technology 2306
  1800KV + HQProp 5136 bench shows real mechanical vibration/resonance across
  most of the RPM range - thrust coefficient of variation up to 66% sample-to
  -sample at some points (e.g. ~20k RPM / 60% throttle) even though RPM and
  current are rock-stable. A 3s tail (300 samples) wasn't enough for the mean
  to converge repeatably (up to 20% swing between back-to-back captures on
  unchanged hardware); a 5s tail approximately doubles the samples averaged.
  This does not fix the underlying vibration - likely prop balance, a loose
  mount, or a structural resonance - only makes the baseline less sensitive to
  it. See Thresholds.efficiency_drop_pct in hwci/baseline.py for the matching
  percentage-tolerance widening.
sample_rate_hz: 100
arm_settle_s: 2.0
steady_tail_fraction: 0.5

safety:
  max_current_a: 40.0
  max_thrust_n: 16.0
  max_rpm: 32000

segments:
  - {label: idle,   throttle: 0.00, duration_s: 2.0}
  - {label: t10,    throttle: 0.10, duration_s: 10.0, ramp: true,  steady: true}
  - {label: t20,    throttle: 0.20, duration_s: 10.0, steady: true}
  - {label: t30,    throttle: 0.30, duration_s: 10.0, steady: true}
  - {label: t40,    throttle: 0.40, duration_s: 10.0, steady: true}
  - {label: t50,    throttle: 0.50, duration_s: 10.0, steady: true}
  - {label: t60,    throttle: 0.60, duration_s: 10.0, steady: true}
  - {label: t70,    throttle: 0.70, duration_s: 10.0, steady: true}
  - {label: t80,    throttle: 0.80, duration_s: 10.0, steady: true}
  - {label: t90,    throttle: 0.90, duration_s: 10.0, steady: true}
  - {label: t100,   throttle: 1.00, duration_s: 10.0, steady: true}
  - {label: rampdn, throttle: 0.00, duration_s: 4.0, ramp: true}
