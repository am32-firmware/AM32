name: CI Build Linux

on: 
  push:
    branches: ["main"]
    tags:
      - 'v[0-9]+.[0-9]+'
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      file_type:
        description: 'File type to upload (hex or elf)'
        required: true
        default: 'hex'
        type: choice
        options:
          - hex
          - elf

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ARM SDK
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            make arm_sdk_install
          elif [ "$RUNNER_OS" == "Windows" ]; then
            make arm_sdk_install
          fi

      - name: Build Project
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            make -j8
          elif [ "$RUNNER_OS" == "Windows" ]; then
            # Use the Windows-specific make binary
            tools/windows/make/bin/make -j8
          fi

      - name: Archive build
        uses: actions/upload-artifact@v4
        with:
          name: AM32-binaries-${{ matrix.os }}
          path: |
            obj/*.hex
          retention-days: 60

      # Fixed the tag release logic
      - name: Prepare release files
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        shell: bash  # Add shell specification
        run: |
          # Find all hex files in obj directory
          hex_files=$(find obj -type f -name "*.hex" | head -10 | tr '\n' ' ')  # Limit to avoid issues
          echo "Found hex files: $hex_files"
          
          # Store in GITHUB_OUTPUT instead of GITHUB_ENV for better practice
          echo "hex_files<<EOF" >> $GITHUB_OUTPUT
          echo "$hex_files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        id: release_files  # Add step ID

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_files.outputs.hex_files }}  # Use the correct syntax
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
